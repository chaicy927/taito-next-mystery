<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台東区 次世代謎解き×街歩き</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --gold: #b7791f;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 18px 40px rgba(15, 23, 42, .12);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff, #f8fafc);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone {
      width: 390px;
      min-height: 760px;
      background: var(--surface);
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(255,255,255,.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .hamburger,
    .lang-btn {
      background: var(--surface-soft);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .hamburger {
      font-size: 22px;
      width: 42px;
      height: 42px;
    }

    .screen {
      min-height: 700px;
      padding: 20px;
      background: var(--bg);
      overflow: auto;
    }

    .hero {
      min-height: 760px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
      text-align: center;
      padding: 32px;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, .16), transparent 42%),
        linear-gradient(180deg, #ffffff, #eff6ff);
    }

    .hero h1 {
      font-size: 32px;
      line-height: 1.35;
      letter-spacing: .04em;
      margin: 0;
    }

    h2 { margin: 0 0 16px; font-size: 24px; }
    h3 { margin: 0 0 8px; }
    p { line-height: 1.7; margin: 6px 0; color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .18);
    }

    .btn:hover { background: var(--primary-dark); }

    .secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .secondary:hover { background: var(--surface-soft); }

    .gold {
      background: var(--gold);
      color: #fff;
      box-shadow: 0 8px 18px rgba(183, 121, 31, .16);
    }

    .danger { background: var(--danger); }
    .success { background: var(--success); }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 12px 0;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
    }

    .image {
      height: 150px;
      border-radius: 20px;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.14), transparent 35%),
        linear-gradient(135deg, #ffffff, #eef2ff);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin-bottom: 12px;
    }

    .map {
      height: 350px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background:
        linear-gradient(90deg, transparent 49%, rgba(37, 99, 235, .09) 50%, transparent 51%),
        linear-gradient(transparent 49%, rgba(37, 99, 235, .09) 50%, transparent 51%),
        #ffffff;
      background-size: 60px 60px;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.8);
    }

    .pin {
      position: absolute;
      background: var(--primary);
      color: white;
      padding: 8px;
      border-radius: 999px;
      font-size: 12px;
      box-shadow: 0 8px 18px rgba(37,99,235,.28);
    }

    .back {
      background: none;
      border: 0;
      color: var(--primary);
      font-size: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .drawer {
      position: absolute;
      top: 0;
      left: -270px;
      width: 270px;
      height: 100%;
      background: #ffffff;
      z-index: 10;
      transition: .25s;
      padding: 24px;
      border-right: 1px solid var(--line);
      box-shadow: 20px 0 50px rgba(15,23,42,.12);
    }

    .drawer.open { left: 0; }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,.22);
      z-index: 9;
    }

    .overlay.open { display: block; }

    .center { text-align: center; }

    .exp {
      color: var(--gold);
      font-size: 28px;
      font-weight: 800;
    }

    .qr {
      height: 250px;
      border: 2px dashed #94a3b8;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      background: #ffffff;
      margin: 20px 0;
      color: #334155;
    }

    .complete {
      background:
        radial-gradient(circle at top, rgba(250, 204, 21, .25), transparent 34%),
        linear-gradient(180deg, #ffffff, #fff7ed);
    }

    .trophy {
      font-size: 76px;
      text-align: center;
      margin: 18px 0;
    }

    .bar {
      height: 14px;
      background: #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      margin: 8px 0;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #60a5fa);
    }

    .small { font-size: 13px; opacity: .85; }
    label { color: var(--muted); }
  </style>
</head>

</div>

  return locale === "ja" ? ja : en;
}

function eventCards(locale) {
  return getEvents(locale).map((event, index) => `
    <div class="card" ${index === 0 ? 'onclick="go(7)"' : ""}>
      <div class="image">${event[0]}</div>
      <h3>${event[1]}</h3>
      <p>${event[2]}</p>
      <p>${event[3]}</p>
    </div>
  `).join("");
}

function render() {
  const screen = screens[current];

  const header = screen.noHeader ? "" : `
    <div class="topbar">
      <button class="hamburger" onclick="toggleMenu(true)">☰</button>
      <button class="lang-btn" onclick="toggleLang()">${ui[lang].switch}</button>
    </div>
  `;

  document.getElementById("app").innerHTML = `
    ${header}
    <main class="screen ${screen.complete ? "complete" : ""}">
      ${screen[lang]}
    </main>
  `;

  menuTitle.textContent = ui[lang].menu;
  menuHome.textContent = ui[lang].home;
  menuProgress.textContent = ui[lang].progress;
  menuProfile.textContent = ui[lang].profile;
  menuSettings.textContent = ui[lang].settings;
  menuLang.textContent = ui[lang].language;
  menuClose.textContent = ui[lang].close;
}

function go(screenNumber) {
  current = screenNumber;
  render();
}

function setLang(selectedLang) {
  lang = selectedLang;
  render();
}

function toggleLang() {
  lang = lang === "ja" ? "en" : "ja";
  render();
}

function toggleMenu(open) {
  drawer.classList.toggle("open", open);
  overlay.classList.toggle("open", open);
}

render();
</script>
